# More info on config here: https://golangci-lint.run/usage/configuration/#config-file
run:
  concurency: 4
  deadline: 2m
  issues-exit-code: 1
  skip-files:
    - ".+_test.go"
    - "vendor/*"

linters:
  enable-all: true
  disable:
    - deadcode
    - exhaustivestruct
    - godot
    - golint
    - gosimple
    - funlen
    - ifshort
    - interfacer
    - maligned
    - nosnakecase
    - scopelint
    - structcheck
    - varcheck
    - varnamelen
  fast: false

linters-settings:
  gocritic:
    enabled-tags:
      - style
      - experimental
      - performance
      - diagnostic
      - opinionated
  gci:
    local-prefixes: github.com/kamilov/goose

issues:
  exclude-use-default: false
  max-issues-per-linter: 100
  max-same-issues: 4
  new: false
